<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>API66</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Roboto',sans-serif;
}

body{
    background:#ffffff;
    color:#202124;
}

.header{
    padding:18px;
    display:flex;
    align-items:center;
    border-bottom:1px solid #ececec;
}

.back{
    font-size:26px;
    margin-right:15px;
    cursor:pointer;
}

.app-section{
    padding:20px;
    display:flex;
}

.logo{
    width:90px;
    height:90px;
    border-radius:20px;
    background:#0b57d0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:30px;
    font-weight:bold;
}

.info{
    margin-left:18px;
}

.app-name{
    font-size:24px;
    font-weight:500;
}

.developer{
    color:#0b57d0;
    margin-top:4px;
    font-size:15px;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.item{
    text-align:center;
    width:80px;
}

.item strong{
    display:block;
    font-size:16px;
}

.item span{
    font-size:12px;
    color:#666;
}

.btn{
    margin:25px 20px;
}

.btn button{
    width:100%;
    background:#0F9D58;
    color:#fff;
    border:none;
    border-radius:30px;
    padding:16px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.btn button:hover{
    background:#0b8a4b;
}

.gallery{
    display:flex;
    overflow:auto;
    padding:0 20px 20px;
    gap:15px;
}

.screen{
    min-width:180px;
    height:360px;
    background:#eee;
    border-radius:18px;
    overflow:hidden;
}

.screen img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.about{
    padding:20px;
}

.about h2{
    margin-bottom:10px;
}

.about p{
    color:#555;
    line-height:1.6;
}

.footer-space{
    height:60px;
}
</style>

</head>
<body>

<div class="header">
<div class="back">&#8592;</div>
<h3>Detail Aplikasi</h3>
</div>

<div class="app-section">

<div class="logo">
API
</div>

<div class="info">

<div class="app-name">
API66
</div>

<div class="developer">
Developer Resmi
</div>

<div class="stats">

<div class="item">
<strong>4.9★</strong>
<span>Rating</span>
</div>

<div class="item">
<strong>100K+</strong>
<span>Pengguna</span>
</div>

<div class="item">
<strong>18+</strong>
<span>Usia</span>
</div>

</div>

</div>

</div>

<div class="btn">
<button onclick="window.location.href='https://example.com';">
Daftar
</button>
</div>

<div class="gallery">

<div class="screen">
<img src="https://picsum.photos/300/600?1">
</div>

<div class="screen">
<img src="https://picsum.photos/300/600?2">
</div>

<div class="screen">
<img src="https://picsum.photos/300/600?3">
</div>

</div>

<div class="about">

<h2>Tentang Aplikasi</h2>

<p>
Nikmati pengalaman menggunakan aplikasi dengan antarmuka modern, proses pendaftaran yang cepat, performa ringan, serta fitur-fitur terbaru yang dirancang untuk memberikan kenyamanan bagi pengguna.
</p>

</div>

<div class="footer-space"></div>

</body>
</html>
