<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Spesial</title>
    <!-- Masukkan Kode Meta Pixel / Google Analytics Anda di sini -->
</head>
<body>

    <!-- Konten Landing Page yang Akan Berubah Dinamis -->
    <div id="landing-page" style="text-align: center; padding: 20px; font-family: Arial, sans-serif;">
        <img id="promo-gambar" src="default-banner.jpg" alt="Promo" style="max-width: 100%; height: auto; border-radius: 8px;">
        <h1 id="promo-judul">Memuat Promo...</h1>
        <p id="promo-deskripsi">Silakan tunggu sebentar.</p>
        <a id="promo-tombol" href="#" style="display: inline-block; padding: 12px 24px; background-color: #25D366; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
            Hubungi WhatsApp
        </a>
    </div>

    <script>
        // Data Konten untuk 10 Promo Berbeda
        const databasePromo = {
            'promo1': {
                judul: "Diskon 50% Skincare Pemutih Wajah",
                deskripsi: "Khusus hari ini! Dapatkan paket lengkap skincare glowing hemat setengah harga. Stok terbatas!",
                gambar: "https://url-gambar-anda.com",
                link_wa: "https://wa.me"
            },
            'promo2': {
                judul: "Promo Buy 1 Get 1 Sepatu Olahraga",
                deskripsi: "Beli 1 pasang sepatu lari, gratis 1 pasang bebas pilih model. Gratis ongkir seluruh Indonesia!",
                gambar: "https://url-gambar-anda.com",
                link_wa: "https://wa.me"
            },
            // ... Tambahkan 'promo3' sampai 'promo10' dengan format yang sama ...
            'promo10': {
                judul: "Cuci Gudang Jam Tangan Pria",
                deskripsi: "Jam tangan elegan pria diskon hingga 70%. Garansi resmi 1 tahun.",
                gambar: "https://url-gambar-anda.com",
                link_wa: "https://wa.me"
            }
        };

        function muatPromoIklan() {
            // 1. Ambil parameter '?p=' dari URL Meta Ads
            const urlParams = new URLSearchParams(window.location.search);
            const parameterPromo = urlParams.get('p');

            // 2. Ambil elemen HTML
            const elemenJudul = document.getElementById('promo-judul');
            const elemenDeskripsi = document.getElementById('promo-deskripsi');
            const elemenGambar = document.getElementById('promo-gambar');
            const elemenTombol = document.getElementById('promo-tombol');

            // 3. Cek apakah parameter ada di database kita
            if (parameterPromo && databasePromo[parameterPromo]) {
                const data = databasePromo[parameterPromo];
                
                // Ubah konten secara dinamis
                elemenJudul.innerText = data.judul;
                elemenDeskripsi.innerText = data.deskripsi;
                elemenGambar.src = data.gambar;
                elemenTombol.href = data.link_wa;
                elemenTombol.innerText = "Beli Sekarang via WhatsApp";
            } else {
                // Tampilan Default jika orang masuk tanpa link iklan (halaman utama)
                elemenJudul.innerText = "Selamat Datang di Toko Kami";
                elemenDeskripsi.innerText = "Temukan berbagai promo menarik dengan melihat iklan terbaru kami di Instagram dan Facebook.";
                elemenGambar.src = "banner-utama.jpg"; 
                elemenTombol.style.display = "none"; // Sembunyikan tombol WA di halaman utama
            }
        }

        // Jalankan fungsi otomatis saat halaman terbuka
        window.addEventListener('DOMContentLoaded', muatPromoIklan);
    </script>
</body>
</html>
