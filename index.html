<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Promo</title>
</head>
<body>

    <!-- AREA KONTEN: Isi bagian ini akan berubah otomatis sesuai link ?p= -->
    <div id="konten-landing-page" style="text-align: center; font-family: sans-serif; padding: 20px;">
        <h1 id="judul-promo">Memuat Halaman...</h1>
        <p id="deskripsi-promo">Mohon tunggu sebentar.</p>
        <a id="tombol-action" href="#" style="display:inline-block; padding:10px 20px; background:#25D366; color:white; text-decoration:none; border-radius:5px; font-weight:bold;">
            Hubungi Kami
        </a>
    </div>

    <script>
        // 1. DAFTAR 10 PROMO ANDA (Silakan ubah teks/link di bawah ini sesuai kebutuhan)
        const daftarPromo = {
            'promo1': {
                judul: "Promo Dashboard Utama - Diskon 50%",
                deskripsi: "Khusus untuk Anda yang datang dari iklan Meta. Dapatkan diskon setengah harga hari ini saja!",
                link_wa: "https://wa.me"
            },
            'promo2': {
                judul: "Promo Spesial 2 - Beli 1 Gratis 1",
                deskripsi: "Kejutan akhir bulan! Beli produk A gratis produk B. Stok terbatas untuk 50 orang pertama.",
                link_wa: "https://wa.me"
            },
            'promo3': {
                judul: "Promo Spesial 3 - Gratis Ongkir",
                deskripsi: "Belanja minimal 50 ribu, gratis ongkos kirim ke seluruh wilayah Indonesia tanpa syarat.",
                link_wa: "https://wa.me"
            }
            // Anda tinggal meneruskan polanya sampai 'promo10' di sini...
        };

        // 2. FUNGSI UNTUK MEMBACA URL (?p=...)
        function prosesUrlParameter() {
            // Mengambil parameter '?p=' dari URL browser
            const parameterUrl = new URLSearchParams(window.location.search);
            const namaPromo = parameterUrl.get('p'); 

            // Menghubungkan ke elemen HTML
            const elemenJudul = document.getElementById('judul-promo');
            const elemenDeskripsi = document.getElementById('deskripsi-promo');
            const elemenTombol = document.getElementById('tombol-action');

            // Cek apakah kode promo di URL terdaftar di daftarPromo di atas
            if (namaPromo && daftarPromo[namaPromo]) {
                const data = daftarPromo[namaPromo];
                
                // Ganti teks & link tombol secara otomatis
                elemenJudul.innerText = data.judul;
                elemenDeskripsi.innerText = data.deskripsi;
                elemenTombol.href = data.link_wa;
                elemenTombol.innerText = "Ambil Promo via WhatsApp";
            } else {
                // Tampilan JIKA orang membuka link biasa tanpa '?p=' (Halaman Utama)
                elemenJudul.innerText = "Selamat Datang di Toko Resmi Kami";
                elemenDeskripsi.innerText = "Silakan lihat-lihat katalog produk terbaik kami di bawah ini atau cek iklan Instagram kami.";
                elemenTombol.style.display = "none"; // Sembunyikan tombol WA di halaman utama jika tidak perlu
            }
        }

        // Jalankan fungsi saat halaman selesai dimuat oleh browser
        window.addEventListener('DOMContentLoaded', prosesUrlParameter);
    </script>

</body>
</html>
